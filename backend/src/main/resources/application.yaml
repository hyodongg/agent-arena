spring:
  application:
    name: backend
  profiles:
    active: local
  config:
    import: "optional:file:.env[.properties]"

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  metrics:
    tags:
      application: agent-arena
    distribution:
      # p95/p99를 Prometheus histogram_quantile로 뽑으려면 _bucket 시리즈가 필요하다.
      # Micrometer는 기본적으로 count/sum/max만 내보낸다.
      percentiles-histogram:
        http.server.requests: true
        hikaricp.connections.acquire: true
