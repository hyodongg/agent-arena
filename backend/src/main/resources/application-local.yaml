spring:
  datasource:
    url: jdbc:mysql://localhost:3306/agent_arena
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

kis:
  base-url: https://openapivts.koreainvestment.com:29443
  app-key: ${KIS_APP_KEY}
  app-secret: ${KIS_APP_SECRET}
